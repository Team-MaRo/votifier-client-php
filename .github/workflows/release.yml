name: Release

# Conventional commits -> release PR -> tagged GitHub Release. release-please
# scans the commits since the last release on master, opens (or updates) a
# "release" PR with the version bump + CHANGELOG.md, and on merge cuts a GitHub
# Release and git tag. Packagist publishes the new version from that tag via its
# GitHub webhook, so no PAT/extra trigger is needed (unlike image-publishing repos).

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create release PR / GitHub Release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
